name: Build and Push to AWS ECR

on:
  push:
    branches: [main, bh-main]
  pull_request:
    branches: [main, bh-main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      SERVICE_NAME: oan-ui-service-bharat

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY_NAME }}
        run: |
          docker build \
            --build-arg VITE_API_URL=${{ vars.VITE_API_URL }} \
            --build-arg VITE_BYPASS_AUTH=${{ vars.VITE_BYPASS_AUTH }} \
            --build-arg VITE_BYPASS_AUTH_MOBILE=${{ vars.VITE_BYPASS_AUTH_MOBILE }} \
            --build-arg VITE_BYPASS_AUTH_NAME=${{ vars.VITE_BYPASS_AUTH_NAME }} \
            --build-arg VITE_BYPASS_AUTH_ROLE=${{ vars.VITE_BYPASS_AUTH_ROLE }} \
            --build-arg VITE_TELEMETRY_HOST=${{ vars.VITE_TELEMETRY_HOST }} \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:${{ env.SERVICE_NAME }}-${{ github.sha }} \
            --label service=${{ env.SERVICE_NAME }} \
            .

          docker tag \
            $ECR_REGISTRY/$ECR_REPOSITORY:${{ env.SERVICE_NAME }}-${{ github.sha }} \
            $ECR_REGISTRY/$ECR_REPOSITORY:${{ env.SERVICE_NAME }}-latest

      - name: Push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY_NAME }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ env.SERVICE_NAME }}-${{ github.sha }}
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ env.SERVICE_NAME }}-latest

      - name: Print image URI
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY_NAME }}
        run: |
          echo "Service   : ${{ env.SERVICE_NAME }}"
          echo "SHA tag   : $ECR_REGISTRY/$ECR_REPOSITORY:${{ env.SERVICE_NAME }}-${{ github.sha }}"
          echo "Latest tag: $ECR_REGISTRY/$ECR_REPOSITORY:${{ env.SERVICE_NAME }}-latest"